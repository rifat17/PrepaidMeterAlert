name: Warm Go Cache

on:
  push:
    branches:
      - master
#    paths:
#      - 'go.mod'
#      - 'go.sum'

jobs:
  cache:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - run: go mod download